<!DOCTYPE html>
<html lang="pt-br">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>DnD Classes</title>
    <link rel="stylesheet" href="estilos/style.css">
    <link rel="shortcut icon" href="images/logo-favicon.png" type="image/x-icon">
    <script src="https://kit.fontawesome.com/31468f7d11.js" crossorigin="anonymous"></script>
    
</head>
<body>
    <header>
        <a href="index.html" class="header-img"><img src="images/logo-150.png" alt="DnD Logo" ></a>
        <!--<nav>   FUTURE MENU
           <i class="fa-solid fa-bars"></i>
        </nav> -->
    </header>
    
    <main id="index-main">
        <div id="banner">
            <div class="banner-text">
                <h1>CRIE UMA <br>NOVA HISTORIA !</h1>
            </div>
            <div class="banner-btn-container">
                <input type="button" value="CRIE UM NOVO PERSONAGEM" class="btn-banner">
            </div>
        </div>
        <div id="class-display">
            <div class="class-preview-text">
                <h1 id="class-title">Bárbaro:</h1>
                <p id="class-text">Guerreiro feroz que luta com força bruta e em fúria para resistir a golpes e causar enorme dano. Usa armas pesadas, pouca armadura e inspira a imagem de um combatente selvagem, destemido e quase impossível de parar em batalha.</p>
                <input type="button" value="SAIBA MAIS..." class="class-btn">
            </div>
            
            
        </div>
        <div id="classes-cards">
            <button class="class-card choosen" data-class="barbarian">
                <img src="images/class-logos/barbarian-icon.png" alt="Barbarian Icon" class="class-icon"></button>
            <button class="class-card" data-class="bard">
                <img src="images/class-logos/bard-icon.png" alt="Bard Icon" class="class-icon"></button>
            <button class="class-card" data-class="cleric">
                <img src="images/class-logos/cleric-icon.png" alt="Cleric Icon" class="class-icon"></button>
            <button class="class-card" data-class="druid">
                <img src="images/class-logos/druid-icon.png" alt="Druid Icon" class="class-icon"></button>
            <button class="class-card" data-class="fighter">
                <img src="images/class-logos/fighter-icon.png" alt="Fighter Icon" class="class-icon"></button>
            <button class="class-card" data-class="monk">
                <img src="images/class-logos/monk-icon.png" alt="Monk Icon" class="class-icon"></button>
            <button class="class-card" data-class="paladin">
                <img src="images/class-logos/paladin-icon.png" alt="Paladin Icon" class="class-icon"></button>
            <button class="class-card" data-class="ranger">
                <img src="images/class-logos/ranger-icon.png" alt="Ranger Icon" class="class-icon"></button>
            <button class="class-card" data-class="rogue" >
                <img src="images/class-logos/rogue-icon.png" alt="Rogue Icon" class="class-icon"></button>
            <button class="class-card" data-class="sorcerer">
                <img src="images/class-logos/sorcerer-icon.png" alt="Sorcerer Icon" class="class-icon"></button>
            <button class="class-card" data-class="warlock">
                <img src="images/class-logos/warlock-icon.png" alt="Warlock Icon" class="class-icon"></button>
            <button class="class-card" data-class="wizard">
                <img src="images/class-logos/wizard-icon.png" alt="Wizard Icon" class="class-icon"></button>        
        </div>
    </main>
    <footer>
        <p>Mock site made by <a href="https://github.com/ThanagorTales" target="_blank">Thales Chaves</a></p>
    </footer>
    <script src="scripts/index-script.js"></script>
</body>
</html>
